<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Référentiel Ingénierie</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}
header{
  background:#f37021;
  color:white;
  padding:25px;
}
main{
  padding:40px;
}
.card{
  background:white;
  padding:30px;
  border-radius:8px;
  max-width:700px;
  margin:auto;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button{
  background:#f37021;
  color:white;
  border:none;
  padding:12px 20px;
  font-size:16px;
  cursor:pointer;
  margin-top:15px;
}
a{
  color:#f37021;
  font-size:18px;
  text-decoration:none;
}
.hidden{display:none}
input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <h1>Référentiel Ingénierie</h1>
  <p>Caténaire & Sous-station</p>
  <p>Réalisé par Brahim Ait Lakhyar</p>
</header>

<main>

<!-- ===== LOGIN ===== -->
<div id="login" class="card">
  <h2>Connexion</h2>
  <select id="role">
    <option value="admin">ADMIN</option>
    <option value="pro">PROFESSIONNEL</option>
  </select>

  <input type="password" id="pwd" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>

  <p id="err" style="color:red"></p>
</div>

<!-- ===== APP ===== -->
<div id="app" class="card hidden">

  <h2>Caténaire</h2>
  <ul>
    <li>
      <a href="./catenaire/manuels-techniques/conception-cegelec.pdf" target="_blank">
        📘 Conception CEGELEC – 3 kV
      </a>
    </li>
  </ul>

</div>

</main>

<script>
function login(){
  const r = document.getElementById("role").value;
  const p = document.getElementById("pwd").value;

  if(
    (r==="admin" && p==="admin123") ||
    (r==="pro" && p==="pro123")
  ){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  }else{
    document.getElementById("err").innerText="Mot de passe incorrect";
  }
}
</script>

</body>
</html>

</body>
</html>
